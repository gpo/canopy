name: Deploy staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for keyless auth via Workload Identity Federation

env:
  GAR_LOCATION: northamerica-northeast2
  GAR_REPOSITORY: gpo
  IMAGE_NAME: canopy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_STAGE }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - id: image
        run: |
          tag="${GAR_LOCATION}-docker.pkg.dev/${{ vars.GCP_PROJECT_STAGE }}/${GAR_REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}"
          echo "image=${tag}" >> "$GITHUB_OUTPUT"

      # Immutable, SHA-tagged images only — never build/deploy `latest`, so
      # every staging deploy is traceable back to a single commit.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.image }}
          secrets: |
            composer_auth=${{ secrets.COMPOSER_AUTH_JSON }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Canopy's own image is now built and pushed. Cutting the staging pod
      # over to it is a GitOps update in gpo-platform-configs: bump the image
      # tag in kubernetes/canopy/values.yaml (mirrors kubernetes/grassroots/)
      # and let ArgoCD sync it. That manifest doesn't exist yet — this step
      # is a placeholder until the app/kubernetes layers for canopy land.
      - run: |
          echo "Built ${{ needs.build-and-push.outputs.image }}"
          echo "TODO: bump kubernetes/canopy/values.yaml in gpo-platform-configs once it exists"

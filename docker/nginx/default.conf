# nginx sidecar for the php-fpm container in the same pod. TLS is terminated
# upstream (Gateway API / load balancer); this only proxies plain HTTP.
server {
    listen 8080;
    server_name _;

    root /app/web;
    index index.php;

    client_max_body_size 64m;

    # WP-Stateless serves uploads from GCS, so nothing under /app/uploads is
    # expected to exist locally in staging/production.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Lightweight endpoint for readiness/liveness probes — exercises the
    # nginx -> php-fpm chain without hitting WordPress bootstrap.
    location = /healthz {
        access_log off;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index healthz.php;
        fastcgi_param SCRIPT_FILENAME /app/web/healthz.php;
        include fastcgi_params;
    }

    location ~* \.(?:css|js|map|woff2?|ttf|svg|ico)$ {
        expires 30d;
        access_log off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}

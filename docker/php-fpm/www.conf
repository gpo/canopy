[www]
user = www-data
group = www-data
listen = 9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; Docker/k8s injects Bedrock's config (DB_*, WP_HOME, GCS keys, etc.) as pod
; env vars. FPM's default (clear_env = yes) strips them from workers, which
; would silently break every env()-driven Config::define() call — this must
; stay "no".
clear_env = no

; Route worker stdout/stderr (PHP warnings, var_dump, etc.) to the container
; log stream instead of discarding it.
catch_workers_output = yes
decorate_workers_output = no
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2
